    <script src="main.js"></script>
    <script>
        // Lightbox Logic
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = lightbox.querySelector('.lightbox-content');
        const closeBtn = document.querySelector('.lightbox-close');
        const prevBtn = document.querySelector('.lightbox-btn.prev');
        const nextBtn = document.querySelector('.lightbox-btn.next');
        
        let currentImages = [];
        let currentIndex = 0;

        const watermark = lightbox.querySelector('.lightbox-watermark');

        const positionWatermark = () => {
            const container = lightboxImg.parentElement;
            const cw = container.clientWidth;
            const ch = container.clientHeight;
            const nw = lightboxImg.naturalWidth;
            const nh = lightboxImg.naturalHeight;
            if (!nw || !nh) return;
            const scale = Math.min(cw / nw, ch / nh);
            const rw = nw * scale;
            const rh = nh * scale;
            const offsetRight = (cw - rw) / 2;
            const offsetBottom = (ch - rh) / 2;
            watermark.style.right = offsetRight + 'px';
            watermark.style.bottom = offsetBottom + 'px';
        };

        lightboxImg.addEventListener('load', positionWatermark);
        window.addEventListener('resize', () => {
            if (lightbox.classList.contains('active')) positionWatermark();
        });

        const openLightbox = (index, images) => {
            currentImages = images;
            currentIndex = index;
            lightboxImg.src = currentImages[currentIndex];
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        const closeLightbox = () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        const showNext = () => {
            currentIndex = (currentIndex + 1) % currentImages.length;
            lightboxImg.src = currentImages[currentIndex];
        };

        const showPrev = () => {
            currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
            lightboxImg.src = currentImages[currentIndex];
        };

        // Event Listeners for Images
        document.addEventListener('click', (e) => {
            const card = e.target.closest('.product-card');
            if (card) {
                const gallery = card.closest('.product-grid');
                const allImgs = Array.from(gallery.querySelectorAll('img')).map(img => img.src);
                const currentImg = card.querySelector('img').src;
                const index = allImgs.indexOf(currentImg);
                openLightbox(index, allImgs);
            }
        });

        closeBtn.addEventListener('click', closeLightbox);
        nextBtn.addEventListener('click', showNext);
        prevBtn.addEventListener('click', showPrev);

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') showNext();
            if (e.key === 'ArrowLeft') showPrev();
        });

        // Show More Logic
        document.querySelectorAll('.btn-show-more').forEach(btn => {
            btn.addEventListener('click', () => {
                const grid = btn.previousElementSibling;
                const isExpanded = grid.classList.toggle('expanded');
                btn.textContent = isExpanded ? 'Zobrazit méně' : 'Zobrazit více';
                
                if (!isExpanded) {
                    grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    </script>
